volumes:
  imaginex-data:

services:
  redis:
    image: redis:7-alpine
    container_name: imaginex-redis
    command: ["redis-server", "--appendonly", "no"]
    ports:
      - "6379:6379"
    restart: unless-stopped

  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: ghcr.io/imaginex/imaginex:latest
    container_name: imaginex-app
    restart: unless-stopped
    ports:
      - "7865:7865"
      - "8000:8000"
    environment:
      CMDARGS: "--listen"
      IMAGINEX_QUEUE_BACKEND: redis
      IMAGINEX_REDIS_URL: redis://redis:6379/0
      IMAGINEX_GPU_COUNT: "2"
      IMAGINEX_BACKEND: sdxl
      IMAGINEX_API_TOKEN: ${IMAGINEX_API_TOKEN:-}
      default_enable_safety_checker: "false"
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
      GRADIO_SERVER_PORT: "7865"
      DATADIR: /content/data
      config_path: /content/data/config.txt
      config_example_path: /content/data/config_modification_tutorial.txt
      path_checkpoints: /content/data/models/checkpoints/
      path_loras: /content/data/models/loras/
      path_embeddings: /content/data/models/embeddings/
      path_vae_approx: /content/data/models/vae_approx/
      path_upscale_models: /content/data/models/upscale_models/
      path_inpaint: /content/data/models/inpaint/
      path_controlnet: /content/data/models/controlnet/
      path_clip_vision: /content/data/models/clip_vision/
      path_fooocus_expansion: /content/data/models/prompt_expansion/fooocus_expansion/
      path_outputs: /content/app/outputs/
    volumes:
      - imaginex-data:/content/data
      - ./outputs:/content/app/outputs
    depends_on:
      - redis
    tty: true
    runtime: nvidia
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["0"]
              capabilities: ["compute", "utility"]
